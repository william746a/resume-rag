# Cloud Build + Artifact Registry for resume-rag native image.
#
# Prerequisites:
#   - Enable Cloud Build, Artifact Registry, Cloud Run, Secret Manager APIs
#   - Create secret: openrouter-key
#   - Create GCS bucket and grant Cloud Run SA roles/storage.objectViewer
#
# Submit:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPO=resume,_SERVICE=resume-rag,_BUCKET=YOUR_GCS_BUCKET,_PUBLIC_URL=https://YOUR_DOMAIN
#
# Then deploy (or uncomment the deploy step below):
#   gcloud run deploy resume-rag \
#     --image ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/resume-rag:$SHORT_SHA \
#     --region ${_REGION} \
#     --memory 1Gi --cpu 1 \
#     --min-instances 0 --max-instances 3 \
#     --allow-unauthenticated \
#     --set-secrets OPENROUTER_API_KEY=openrouter-key:latest \
#     --set-env-vars DOCUMENTS_GCS_BUCKET=${_BUCKET},RESUME_PUBLIC_URL=${_PUBLIC_URL},QUARKUS_PROFILE=prod

substitutions:
  _REGION: us-central1
  _REPO: resume
  _SERVICE: resume-rag

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - src/main/docker/Dockerfile.multistage-native
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 3600s
