# OpenRouter (OpenAI-compatible API)
quarkus.langchain4j.openai.base-url=https://openrouter.ai/api/v1
# Non-empty default so SmallRye config mapping validates; override with a real key.
quarkus.langchain4j.openai.api-key=${OPENROUTER_API_KEY:local-dev-replace-me}
quarkus.langchain4j.openai.chat-model.model-name=anthropic/claude-3.5-haiku
quarkus.langchain4j.openai.chat-model.temperature=0.3
quarkus.langchain4j.openai.timeout=60s
quarkus.langchain4j.openai.chat-model.custom-headers."HTTP-Referer"=https://localhost
quarkus.langchain4j.openai.chat-model.custom-headers."X-Title"=Resume RAG

# Local ONNX embeddings (BGE); disable remote OpenAI embeddings
quarkus.langchain4j.openai.embedding-model.enabled=false

# Native image (Phase 3): ensure classpath resources are included
quarkus.native.resources.includes=resume.md,context/*.md,prompts/*.txt

# Document corpus ingestion
documents.gcs.bucket=${DOCUMENTS_GCS_BUCKET:}
documents.gcs.context-prefix=${DOCUMENTS_GCS_CONTEXT_PREFIX:context/}
documents.gcs.context-prefix-enabled=${DOCUMENTS_GCS_CONTEXT_PREFIX_ENABLED:false}

documents.sources[0].id=resume
documents.sources[0].role=resume
documents.sources[0].source=classpath
documents.sources[0].classpath.path=resume.md

# Dev: load supplemental context documents from classpath
%dev.documents.sources[1].id=writing-samples
%dev.documents.sources[1].role=context
%dev.documents.sources[1].source=classpath
%dev.documents.sources[1].classpath.path=context/writing-samples.md

%dev.documents.sources[2].id=project-migration
%dev.documents.sources[2].role=context
%dev.documents.sources[2].source=classpath
%dev.documents.sources[2].classpath.path=context/project-migration.md

# Quinoa (Angular UI)
quarkus.quinoa.ui-dir=src/main/webui
quarkus.quinoa.build-dir=dist/webui/browser
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.node-version=20.10.0
quarkus.quinoa.enable-spa-routing=true
